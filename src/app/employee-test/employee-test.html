<section class="emplyess-test-section">
  <h1>Employee Directory</h1>

  <app-dashboard [employees]="employees" [departments]="departments"></app-dashboard>

  @if (successMessage) {
    <div class="alert-success"><strong>Success!</strong> {{ successMessage }}</div>
  }

  @if (errorMessage) {
    <div class="alert-error"><strong>Error:</strong> {{ errorMessage }}</div>
  }

  @if (userRole === 'Admin' || userRole === 'HR') {
    <app-employee-form 
      [currentEmployee]="currentEmployee" 
      [departments]="departments" 
      [isEditing]="isEditing"
      (onSave)="saveEmployee()" 
      (onCancel)="resetForm()">
    </app-employee-form>
  }

  <app-employee-list 
    [employees]="employees" 
    [userRole]="userRole"
    (onEdit)="editEmployee($event)" 
    (onDelete)="deleteEmployee($event)">
  </app-employee-list>

</section>
