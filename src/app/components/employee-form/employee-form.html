<div class="form-container">
  <h3>{{ isEditing ? 'Edit Employee' : 'Add New Employee' }}</h3>

  <app-photo-upload
    [existingPhotoUrl]="currentEmployee.photoUrl || ''"
    (fileSelected)="onPhotoSelected($event)"
  ></app-photo-upload>

  <div class="form-row">
    <label class="file-label">
      Employee Document
      <input type="file" (change)="onDocumentChange($event)" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" />
    </label>
    <div class="file-info">
      @if (selectedDocumentName) {
        <span>Selected: {{ selectedDocumentName }}</span>
        <button type="button" class="btn-cancel" (click)="removeDocument()">Remove</button>
      } @else if (currentEmployee.documentUrl) {
        <a [href]="getDocumentUrl()" target="_blank" rel="noopener">
          View Current Document
        </a>
      }
    </div>
  </div>

  <div class="form-row">
    <input type="text" [(ngModel)]="currentEmployee.name" placeholder="Full Name *" required />
    <input type="email" [(ngModel)]="currentEmployee.email" placeholder="Email Address *" required />
    @if (emailValue && !isEmailValid) {
      <span class="field-error">Please enter a valid email address.</span>
    }
    <input type="text" [(ngModel)]="currentEmployee.mobile" placeholder="Mobile Number" />
    <input type="number" [(ngModel)]="currentEmployee.salary" placeholder="Salary (Rs)" />

    <select [(ngModel)]="currentEmployee.departmentId" required>
      <option [ngValue]="null" disabled>Select Department *</option>
      @for (dept of departments; track dept.id) {
        <option [value]="dept.id">{{ dept.name }}</option>
      }
    </select>

    <input type="date" [(ngModel)]="currentEmployee.joinDate" />
  </div>

  <div class="form-actions">
    <button
      class="btn btn-primary d-inline-flex align-items-center gap-2"
      type="button"
      (click)="save()"
      [disabled]="!canSave"
    >
      @if (isLoading) {
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <span>Sending Email...</span>
      } @else {
        <span>{{ isEditing ? 'Update Employee' : 'Save Employee' }}</span>
      }
    </button>

    @if (isEditing) {
      <button class="btn-cancel" type="button" (click)="cancel()">Cancel</button>
    }
  </div>
</div>
