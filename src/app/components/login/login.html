<section class="login-section">
  <div class="login-wrapper">
    <div class="login-card">
      <h2>HRMS Login</h2>

      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <div class="input-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="loginObj.username" placeholder="Enter your username" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginObj.password" placeholder="Enter your password" />
      </div>

      <button class="login-btn" type="button" (click)="onLogin()">Login</button>

      <div class="footer-link">
        New account required? Please contact Admin / HR.
      </div>
    </div>
  </div>
</section>
